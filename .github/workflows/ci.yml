name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.7"
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest -q

  frontend:
    name: Frontend build & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  helm:
    name: Helm lint & template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/arango-tools
      - name: Render (defaults + full)
        run: |
          helm template t deploy/helm/arango-tools > /dev/null
          helm template t deploy/helm/arango-tools \
            --set connection.password=test \
            --set ingress.enabled=true \
            --set workDir.persistence.enabled=true > /dev/null

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: arango-tools:ci
      - name: Smoke test
        run: |
          docker run -d --name arango-ci -p 8000:8000 arango-tools:ci
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/api/ready >/dev/null; then echo ready; break; fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/api/health
          curl -fsS http://127.0.0.1:8000/api/ready
          docker rm -f arango-ci
