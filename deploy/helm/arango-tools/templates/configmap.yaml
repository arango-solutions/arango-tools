apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "arango-tools.fullname" . }}-config
  labels:
    {{- include "arango-tools.labels" . | nindent 4 }}
data:
  # Non-secret ArangoDB connection defaults + CORS. The password is supplied
  # separately via a Secret (see deployment env).
  ARANGO_ENDPOINT: {{ .Values.connection.endpoint | quote }}
  ARANGO_DATABASE: {{ .Values.connection.database | quote }}
  ARANGO_USERNAME: {{ .Values.connection.username | quote }}
  ARANGO_CORS_ORIGINS: {{ .Values.corsOrigins | quote }}
