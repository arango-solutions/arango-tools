apiVersion: v1
kind: Service
metadata:
  name: {{ include "arango-tools.fullname" . }}
  labels:
    {{- include "arango-tools.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "arango-tools.selectorLabels" . | nindent 4 }}
